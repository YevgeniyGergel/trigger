name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trigger
          POSTGRES_PASSWORD: trigger
          POSTGRES_DB: trigger_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://trigger:trigger@localhost:5432/trigger_ci?schema=public
      AUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      NOTE_ENCRYPTION_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma migration check
        run: npx prisma migrate deploy

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
